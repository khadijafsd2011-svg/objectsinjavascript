<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>Finding the Largest Number with the help of Argument Objects</p>
    <p id="result"></p>
    <script>
        function findmax() {
            var i;
            var max = 0
            for (i = 0; i < arguments.length; i++) {
                if (arguments[i] > max) {
                    max = arguments[i]
                }
            }
            return max
        }
        document.getElementById("result").innerHTML = findmax(7, 8, 15)
    </script>
</body>

</html>
